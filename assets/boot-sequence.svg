<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="100%">
  <defs>
    <filter id="term-glow"><feGaussianBlur stdDeviation="0.8"/></filter>
  </defs>

  <!-- Terminal frame -->
  <rect x="0" y="0" width="700" height="200" rx="8" fill="#0a0a14" stroke="#FF00FF" stroke-width="2"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="700" height="22" rx="8" fill="#1a0033"/>
  <rect x="0" y="14" width="700" height="8" fill="#1a0033"/>
  <circle cx="14" cy="11" r="4" fill="#FF0080"/>
  <circle cx="28" cy="11" r="4" fill="#FFAA00"/>
  <circle cx="42" cy="11" r="4" fill="#00FF80"/>
  <text x="350" y="15" font-family="monospace" font-size="11" fill="#888" text-anchor="middle">~ /robot/boot — initializing</text>

  <!-- Boot log lines with sequential fade-in -->
  <g font-family="monospace" font-size="13" fill="#00FFFF" filter="url(#term-glow)">
    <text x="14" y="48" opacity="0">
      <animate attributeName="opacity" values="0;1;1" dur="6s" begin="0s" repeatCount="indefinite"/>
      [BOOT] <tspan fill="#FF00FF">aditya.raj</tspan> :: kernel loaded ✓
    </text>
    <text x="14" y="68" opacity="0">
      <animate attributeName="opacity" values="0;1;1" dur="6s" begin="0.5s" repeatCount="indefinite"/>
      [INIT] mounting <tspan fill="#FF00FF">/dev/pytorch</tspan> ............ <tspan fill="#00FF80">OK</tspan>
    </text>
    <text x="14" y="88" opacity="0">
      <animate attributeName="opacity" values="0;1;1" dur="6s" begin="1.2s" repeatCount="indefinite"/>
      [INIT] mounting <tspan fill="#FF00FF">/dev/langchain</tspan> .......... <tspan fill="#00FF80">OK</tspan>
    </text>
    <text x="14" y="108" opacity="0">
      <animate attributeName="opacity" values="0;1;1" dur="6s" begin="1.9s" repeatCount="indefinite"/>
      [INIT] starting <tspan fill="#FF00FF">ros2_daemon</tspan> ............ <tspan fill="#00FF80">OK</tspan>
    </text>
    <text x="14" y="128" opacity="0">
      <animate attributeName="opacity" values="0;1;1" dur="6s" begin="2.6s" repeatCount="indefinite"/>
      [INIT] CUDA cores: <tspan fill="#FFFF00">1024</tspan> online ........ <tspan fill="#00FF80">READY</tspan>
    </text>
    <text x="14" y="148" opacity="0">
      <animate attributeName="opacity" values="0;1;1" dur="6s" begin="3.3s" repeatCount="indefinite"/>
      [INIT] vision stack loaded ............... <tspan fill="#00FF80">READY</tspan>
    </text>
    <text x="14" y="172" opacity="0" font-size="14" fill="#FF00FF">
      <animate attributeName="opacity" values="0;1;1" dur="6s" begin="4.2s" repeatCount="indefinite"/>
      [READY] <tspan fill="#FFFF00">$</tspan> awaiting mission directive _
    </text>
  </g>

  <!-- Blinking cursor -->
  <rect x="395" y="161" width="10" height="14" fill="#FFFF00">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" begin="4.2s" repeatCount="indefinite"/>
  </rect>
</svg>
