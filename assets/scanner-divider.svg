<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 40" width="100%" height="40" preserveAspectRatio="none">
  <defs>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF00FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00FFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF00FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="scan-glow"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>

  <!-- Main horizontal line -->
  <line x1="0" y1="20" x2="800" y2="20" stroke="url(#line)" stroke-width="1"/>

  <!-- Moving scanner blip -->
  <circle cx="0" cy="20" r="4" fill="#00FFFF" filter="url(#scan-glow)">
    <animate attributeName="cx" values="0;800;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;6;3" dur="0.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Tick marks -->
  <g stroke="#FF00FF" stroke-width="1" opacity="0.6">
    <line x1="80"  y1="14" x2="80"  y2="26"/>
    <line x1="200" y1="14" x2="200" y2="26"/>
    <line x1="320" y1="14" x2="320" y2="26"/>
    <line x1="440" y1="14" x2="440" y2="26"/>
    <line x1="560" y1="14" x2="560" y2="26"/>
    <line x1="680" y1="14" x2="680" y2="26"/>
  </g>

  <!-- Pulse rings around blip -->
  <circle cx="0" cy="20" r="8" fill="none" stroke="#00FFFF" stroke-width="0.5" opacity="0">
    <animate attributeName="cx" values="0;800;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;14;4" dur="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="0.6s" repeatCount="indefinite"/>
  </circle>
</svg>
